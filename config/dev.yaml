# 本地开发 — 流畅优先，使用 assets/preview/ 轻量资源
recognition_mode: dev
match_interval_sec: 0.8
similarity_threshold: 0.05
similarity_threshold_hold: 0.03
vote_count: 2
verbose_match: false
sequence_interval_sec: 5

camera:
  width: 640
  height: 480
  preview_width: 640
  device: 0

perception:
  reference_max_size: 600
  sift_max_features: 250
  flann_checks: 32
  match_frame_scale: 0.35
  use_preview_assets: true

display:
  width: 1280
  height: 720
  overlay_max_width_ratio: 0.30
  overlay_max_height_ratio: 0.42
  use_static_background: true
  use_preview_assets: true

output:
  driver: file
